version: 2

project_name: ediforge

builds:
  - id: edi-json
    main: ./cmd/edi-json
    binary: edi-json
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/johnmonarch/ediforge/internal/app.Version={{ .Version }} -X github.com/johnmonarch/ediforge/internal/app.Commit={{ .Commit }} -X github.com/johnmonarch/ediforge/internal/app.Date={{ .Date }}

archives:
  - id: edi-json
    ids:
      - edi-json
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: checksums.txt

# Homebrew formula generation is staged. The initial tap exists at
# github.com/johnmonarch/homebrew-tap; set skip_upload to false after providing
# the release workflow a token that can write to that repository.
brews:
  - name: edi-json
    ids:
      - edi-json
    repository:
      owner: johnmonarch
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/johnmonarch/ediforge
    description: Local-first EDI-to-JSON translator for X12 and UN/EDIFACT
    license: Apache-2.0
    skip_upload: true
    install: |
      bin.install "edi-json"
    test: |
      system "#{bin}/edi-json", "version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: johnmonarch
    name: EDIForge
  prerelease: auto
  make_latest: false
